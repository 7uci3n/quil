name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Lint is now clean and BLOCKING (src + tests). Format stays advisory until
      # the pre-existing files are reformatted incrementally (pre-commit auto-fixes
      # touched files). See docs/audit Phase 0.
      - name: Lint
        run: npm run lint

      - name: Format check (advisory)
        run: npx prettier --check .
        continue-on-error: true

      - name: Type check
        run: npm run typecheck

      - name: Test + coverage
        run: npm run test:coverage
