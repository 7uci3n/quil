name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Lint + format are now clean and BLOCKING (repo-wide reformat done in
      # audit D11). Type check covers src + tests (tsconfig.test.json).
      - name: Lint
        run: npm run lint

      - name: Format check
        run: npx prettier --check .

      - name: Type check
        run: npm run typecheck

      - name: Test + coverage
        run: npm run test:coverage
