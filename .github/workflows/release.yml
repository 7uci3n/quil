name: Release image

# Publishes a multi-arch image to GitHub Container Registry (ghcr.io).
# Triggers on version tags (v1.2.3) or a published GitHub Release.
#
# The image name is ghcr.io/${{ github.repository }} — i.e. it publishes to
# WHICHEVER repo it runs in. On remnantwestmarches/quil (after the PR is merged
# and a release is cut) this produces the PRODUCTION image operators pull. On the
# 7uci3n/quil dev fork it produces a throwaway test image. No per-repo edits needed.
on:
  push:
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # built-in, no manual secret needed

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
